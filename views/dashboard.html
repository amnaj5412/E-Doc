<div id="stats-bar" class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-blue-500">
        <p class="text-slate-400 text-xs font-bold uppercase">รับเข้า</p>
        <h3 id="stat-in" class="text-2xl font-bold">0</h3>
    </div>
    <div class="bg-indigo-500 text-white p-5 rounded-2xl shadow-sm">
        <p class="text-white/70 text-xs font-bold uppercase">ส่งออก</p>
        <h3 id="stat-out" class="text-2xl font-bold">0</h3>
    </div>
    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-slate-400">
        <p class="text-slate-400 text-xs font-bold uppercase">จำหน่าย</p>
        <h3 id="stat-del" class="text-2xl font-bold">0</h3>
    </div>
</div>

<div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
    <div class="p-4 border-b flex flex-col lg:flex-row justify-between items-center gap-4 bg-slate-50/50">
        <h2 id="list-head" class="font-bold text-slate-700 text-lg">รายการเอกสาร</h2>
        <div class="flex gap-2 w-full lg:w-auto">
            <select id="filter-year" onchange="resetAndRender()" class="px-3 py-2 border rounded-xl text-sm outline-none">
                <option value="all">ทุกปี</option>
            </select>
            <input type="text" id="filter-search" onkeyup="resetAndRender()" placeholder="ค้นหา..." class="flex-1 px-4 py-2 border rounded-xl text-sm outline-none">
        </div>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-bold border-b">
                <tr><th class="p-4">เลขที่ / วันที่</th><th class="p-4">เรื่อง</th><th class="p-4">ผู้ส่ง - ผู้รับ</th><th class="p-4 text-center">จัดการ</th></tr>
            </thead>
            <tbody id="list-table" class="divide-y text-sm bg-white"></tbody>
        </table>
    </div>
</div>
